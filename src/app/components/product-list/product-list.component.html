<app-add-product (onAdd)="addProduct($event)"></app-add-product>

@for (product of productService.products(); track product; let i = $index) {
@if (editingIndex === i) {
<app-edit-product [product]="product" [index]="i" (onSave)="saveEdit($event)" (onCancel)="cancelEdit()">
</app-edit-product>
} @else {
<ion-card>
  <ion-card-header>
    <ion-card-title>{{ product.name }}</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-item>
      <ion-label>{{ product.displayInfo() }}</ion-label>
    </ion-item>
    <ion-button (click)="startEdit(i)">Редагувати</ion-button>
    <ion-button color="danger" (click)="deleteProduct(i)">Видалити</ion-button>
  </ion-card-content>
</ion-card>
}
}
